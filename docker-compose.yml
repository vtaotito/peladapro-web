        <section id="features" class="features"><h2>Tudo que sua pelada precisa</h2><div class="features-grid"><div class="feature-card"><div class="feature-icon">&#128101;</div><h3>Confirma&ccedil;&otilde;es Inteligentes</h3><p>Presen&ccedil;a, fila de espera autom&aacute;tica, separa&ccedil;&atilde;o goleiro/linha e check-in por QR Code.</p></div><div class="feature-card"><div class="feature-icon">&#9889;</div><h3>Sorteio Equilibrado</h3><p>Algoritmo que equilibra times por habilidade, posi&ccedil;&atilde;o e hist&oacute;rico. Com explica&ccedil;&atilde;o visual.</p></div><div class="feature-card"><div class="feature-icon">&#9201;</div><h3>Placar ao Vivo</h3><p>Cron&ocirc;metro, eventos em tempo real, timeline da partida e controle de rota&ccedil;&atilde;o.</p></div><div class="feature-card"><div class="feature-icon">&#127942;</div><h3>Rankings &amp; Estat&iacute;sticas</h3><p>Rankings semanais, mensais e anuais. Overall calculado e evolu&ccedil;&atilde;o dos jogadores.</p></div><div class="feature-card"><div class="feature-icon">&#128176;</div><h3>Controle Financeiro</h3><p>Mensalidades, di&aacute;rias, carteira digital, controle de caixa e relat&oacute;rios.</p></div><div class="feature-card"><div class="feature-icon">&#127775;</div><h3>Gamifica&ccedil;&atilde;o &amp; Social</h3><p>Conquistas, trof&eacute;us, badges, mural do grupo e compartilhamento de destaques.</p></div></div></section>
