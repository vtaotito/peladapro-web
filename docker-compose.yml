        <section class="hero"><div class="hero-badge">&#9889; A plataforma #1 para peladas no Brasil</div><h1>Organize suas peladas <span>como um profissional</span></h1><p>Confirma&ccedil;&otilde;es, sorteio inteligente, placar ao vivo, rankings, financeiro e muito mais. Tudo em um s&oacute; lugar.</p><div class="hero-buttons"><a href="#" class="btn btn-primary btn-lg">Come&ccedil;ar gr&aacute;tis &rarr;</a><a href="#features" class="btn btn-outline btn-lg">Ver funcionalidades</a></div><p class="hero-sub">Gr&aacute;tis para sempre no plano b&aacute;sico. Sem cart&atilde;o de cr&eacute;dito.</p>
