services:
  boleiros-db:
    image: postgres:16-alpine
    container_name: boleiros-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-boleiros}
      POSTGRES_USER: ${POSTGRES_USER:-boleiros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - boleiros-db-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-boleiros} -d ${POSTGRES_DB:-boleiros}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boleiros-network

  boleiros-redis:
    image: redis:7-alpine
    container_name: boleiros-redis
    restart: unless-stopped
    command: redis-server --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - boleiros-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boleiros-network

  boleiros-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: boleiros-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-boleiros}:${POSTGRES_PASSWORD:?err}@boleiros-db:5432/${POSTGRES_DB:-boleiros}
      REDIS_URL: redis://boleiros-redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: "3001"
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      boleiros-db:
        condition: service_healthy
      boleiros-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - boleiros-network

  boleiros-web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://peladapro.cloud/api}
        NEXT_PUBLIC_PLATFORM_ADMIN_EMAIL: ${NEXT_PUBLIC_PLATFORM_ADMIN_EMAIL:-}
        NEXT_PUBLIC_PLATFORM_ADMIN_PASSWORD: ${NEXT_PUBLIC_PLATFORM_ADMIN_PASSWORD:-}
    container_name: boleiros-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      boleiros-api:
        condition: service_healthy
    environment:
      HOSTNAME: "0.0.0.0"
    networks:
      - boleiros-network

volumes:
  boleiros-db-data:
  boleiros-redis-data:

networks:
  boleiros-network:
    driver: bridge
