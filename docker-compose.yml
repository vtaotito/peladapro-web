.875rem 2rem;font-size:1.125rem;border-radius:1rem}.btn-white{background:#fff;color:var(--pitch);font-weight:700}.btn-white:hover{background:#f1f5f9}.btn-outline{background:none;border:2px solid var(--border);color:var(--fg)}.btn-outline:hover{border-color:var(--brand);color:var(--brand)}.hero{padding:8rem 1rem 5rem;text-align:center;position:relative;overflow:hidden}.hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:50rem;height:50rem;border-radius:50%;background:radial-gradient(circle,rgba(22,163,74,.08),transparent 70%);z-index:-1}.hero-badge{display:inline-block;padding:.375rem 1rem;background:rgba(22,163,74,.08);color:var(--brand);font-size:.875rem;font-weight:600;border-radius:9999px;margin-bottom:1.5rem}.hero h1{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:clamp(2.25rem,5vw,3.75rem);font-weight:800;letter-spacing:-.025em;line-height:1.1;margin-bottom:1.5rem}.hero h1 span{background:linear-gradient(135deg,#16a34a,#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.hero p{font-size:1.125rem;color:var(--muted);max-width:36rem;margin:0 auto 2.5rem}.hero-buttons{display:flex;flex-direction:column;gap:1rem;align-items:center}@media(min-width:640px){.hero-buttons{flex-direction:row;justify-content:center}}.hero-sub{font-size:.75rem;color:#94a3b8;margin-top:1rem}.stats{padding:3rem 1rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface)}.stats-grid{max-width:56rem;margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);gap:2rem;text-align:center}@media(min-width:640px){.stats-grid{grid-template-columns:repeat(4,1fr)}}.stat-value{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:1.875rem;font-weight:800;color:var(--brand)}.stat-label{font-size:.875rem;color:var(--muted);margin-top:.25rem}.features{padding:5rem 1rem}.features h2{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:1.875rem;font-weight:800;text-align:center;margin-bottom:3rem}.features-grid{max-width:72rem;margin:0 auto;display:grid;gap:1.5rem}@media(min-width:640px){.features-grid{grid-template-columns:repeat(2,1fr)}}@media(min-width:1024px){.features-grid{grid-template-columns:repeat(3,1fr)}}.feature-card{padding:1.5rem;border:1px solid var(--border);border-radius:1rem;transition:all .3s}.feature-card:hover{border-color:#86efac;box-shadow:0 10px 25px rgba(22,163,74,.08)}.feature-icon{font-size:2rem;margin-bottom:.75rem}.feature-card h3{font-weight:700;font-size:1.05rem;margin-bottom:.25rem}.feature-card p{font-size:.875rem;color:var(--muted);line-height:1.6}.how{padding:5rem 1rem;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}.how h2{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:1.875rem;font-weight:800;text-align:center;margin-bottom:3rem}.how-grid{max-width:56rem;margin:0 auto;display:grid;gap:2rem;text-align:center}@media(min-width:640px){.how-grid{grid-template-columns:repeat(4,1fr)}}.how-step{font-family:'Plus Jakarta Sans',system-ui,sans-serif;display:inline-flex;width:3.5rem;height:3.5rem;align-items:center;justify-content:center;border-radius:1rem;background:linear-gradient(135deg,#0f2b18,#1a472a,#2d6a4f);color:#fff;font-weight:800;font-size:1.125rem;margin-bottom:1rem}.how h3{font-weight:700;margin-bottom:.5rem}.how p{font-size:.875rem;color:var(--muted)}.cta{padding:5rem 1rem}.cta-box{max-width:56rem;margin:0 auto;background:linear-gradient(135deg,#0f2b18,#1a472a,#2d6a4f);border-radius:1.5rem;padding:4rem 2rem;text-align:center;color:#fff}.cta-box h2{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:1.875rem;font-weight:800;margin-bottom:1rem}.cta-box p{color:rgba(255,255,255,.7);margin-bottom:2rem;font-size:1.05rem}.cta-perks{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem;font-size:.875rem;color:rgba(255,255,255,.6)}.cta-perks span{display:flex;align-items:center;gap:.25rem}footer{border-top:1px solid var(--border);padding:2rem 1rem;text-align:center}.footer-inner{max-width:72rem;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:1rem}@media(min-width:640px){.footer-inner{flex-direction:row;justify-content:space-between}}.footer-links{display:flex;gap:1.5rem}.footer-links a{font-size:.875rem;color:var(--muted);text-decoration:none}.footer-links a:hover{color:var(--fg)}.copyright{font-size:.75rem;color:#94a3b8}.preview-card{max-width:28rem;margin:3rem auto 0;border-radius:1rem;border:1px solid rgba(0,0,0,.06);box-shadow:0 20px 60px rgba(22,163,74,.1);overflow:hidden;text-align:left}.preview-header{background:linear-gradient(135deg,#0f2b18,#1a472a,#2d6a4f);padding:1.25rem;color:#fff}.preview-header small{font-size:.625rem;text-transform:uppercase;letter-spacing:.1em;opacity:.7}.preview-header h3{font-size:1.125rem;font-weight:700;margin-top:.25rem}.preview-header .date{text-align:right}.preview-header .date p:first-child{font-size:1.5rem;font-weight:800}.preview-header .date p:last-child{font-size:.75rem;opacity:.8}.preview-header .flex{display:flex;justify-content:space-between;align-items:center}.preview-body{padding:1.25rem;background:#fff}.preview-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1rem}.preview-stat{text-align:center;padding:.75rem;border-radius:.75rem}.preview-stat.green{background:#f0fdf4}.preview-stat.green .num{color:#16a34a}.preview-stat.amber{background:#fffbeb}.preview-stat.amber .num{color:#d97706}.preview-stat.blue{background:#eff6ff}.preview-stat.blue .num{color:#2563eb}.preview-stat .num{font-size:1.25rem;font-weight:800}.preview-stat .label{font-size:.625rem;font-weight:600}
