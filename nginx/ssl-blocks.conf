server {
    listen 443 ssl http2;
    server_name adm.oliecare.cloud;
    ssl_certificate /etc/letsencrypt/live/adm.oliecare.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adm.oliecare.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    location /api/ {
        proxy_pass http://olivebaby-api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90s;
    }
    location / {
        proxy_pass http://web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    add_header Strict-Transport-Security "max-age=31536000" always;
}

