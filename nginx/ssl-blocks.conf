server {
    listen 443 ssl http2;
    server_name n8n.oliecare.cloud;
    ssl_certificate /etc/letsencrypt/live/n8n.oliecare.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.oliecare.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {
        proxy_pass http://olivebaby-n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    add_header Strict-Transport-Security "max-age=31536000" always;
}

