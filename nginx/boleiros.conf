upstream boleiros_web {
    server boleiros-web:3000;
    keepalive 32;
}

upstream boleiros_api {
    server boleiros-api:3001;
    keepalive 32;
}

server {
    listen 8080;
    server_name boleiros.app www.boleiros.app oliecare.cloud;

    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    # API routes — strip /api prefix
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://boleiros_api;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Auth routes — proxy directly (no prefix stripping)
    location /auth/ {
        proxy_pass http://boleiros_api;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Health check endpoint
    location /api/health {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://boleiros_api;
        access_log off;
    }

    # WebSocket support for future realtime
    location /ws {
        proxy_pass http://boleiros_api;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://boleiros_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://boleiros_web;
        proxy_cache_valid 200 60m;
    }

    # Public static files
    location /static/ {
        proxy_pass http://boleiros_web;
        add_header Cache-Control "public, max-age=86400";
    }

    # Favicon and manifest
    location ~* ^/(favicon\.ico|manifest\.json|icon-.*\.png|robots\.txt|sitemap\.xml)$ {
        proxy_pass http://boleiros_web;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # All other requests go to Next.js frontend
    location / {
        proxy_pass http://boleiros_web;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        # WebSocket support for Next.js HMR (dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
